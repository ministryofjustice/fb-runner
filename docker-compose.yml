networks:
  app-net:
    name: fb-app-bridge-network
  db-net:
    name: fb-db-bridge-network

services:
  runner-app:
    container_name: runner-app
    build:
      context: .
      args:
        BUNDLE_ARGS: ''
        SERVICE_FIXTURE: 'version'
    tty: true
    stdin_open: true
    ports:
      - 9000:3000
    env_file:
      - .env.development
    environment:
      RAILS_ENV: development
      RAILS_LOG_TO_STDOUT: 'true'
      SERVICE_FIXTURE: 'version'
      USER_DATASTORE_URL: http://user-datastore-api:3000
      USER_FILESTORE_URL: http://user-filestore-api:3000
      SUBMITTER_URL: http://submitter-api:3000
    depends_on:
      - runner-service-token-cache-api
      - user-datastore-api
      - user-filestore-api
    networks:
      - app-net
      - db-net

  user-datastore-db:
    container_name: user-datastore-db
    image: postgres:10.9-alpine
    restart: always
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_USER: postgres
      POSTGRES_DB: datastore_local
    networks:
      - db-net

  user-datastore-api:
    container_name: user-datastore-api
    build:
      context: https://github.com/ministryofjustice/fb-user-datastore.git
    environment:
      SENTRY_DSN: sentry-dsn
      RAILS_ENV: development
      RAILS_LOG_TO_STDOUT: 'true'
      MAX_IAT_SKEW_SECONDS: '60'
      SERVICE_TOKEN_CACHE_ROOT_URL: http://runner-service-token-cache-api:3000
      DATABASE_URL: postgres://postgres:password@user-datastore-db/datastore_local
      # Allow host authorization for Docker hostname in Rails development
      RAILS_DEVELOPMENT_HOSTS: user-datastore-api
    depends_on:
      - user-datastore-db
    networks:
      - app-net
      - db-net

  user-filestore-api:
    container_name: user-filestore-api
    build:
      context: https://github.com/ministryofjustice/fb-user-filestore.git
    environment:
      # Keys below are all fake and can be committed to git
      SECRET_KEY_BASE: 'super_secret'
      MAX_IAT_SKEW_SECONDS: "300"
      RAILS_ENV: development
      RAILS_LOG_TO_STDOUT: "true"
      SERVICE_TOKEN_CACHE_ROOT_URL: http://runner-service-token-cache-api:3000
      AWS_S3_BUCKET_NAME: moj-formbuilder
      KEY_ENCRYPTION_IV: 1234567890123456
      ENCRYPTION_IV: 1234567890123451
      ENCRYPTION_KEY: a9c12000de36def805e4c2107bd8e910
      RAILS_DEVELOPMENT_HOSTS: user-filestore-api
    depends_on:
      - localstack
    networks:
      - app-net

  localstack:
    container_name: "${LOCALSTACK_DOCKER_NAME:-localstack-main}"
    image: localstack/localstack
    ports:
      - "127.0.0.1:4566:4566"            # LocalStack Gateway
      - "127.0.0.1:4510-4559:4510-4559"  # external services port range
    environment:
      # LocalStack configuration: https://docs.localstack.cloud/references/configuration/
      - DEBUG=${DEBUG:-0}
    networks:
      - app-net
    volumes:
      - "${LOCALSTACK_VOLUME_DIR:-./volume}:/var/lib/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"

  runner-service-token-cache-api:
    container_name: runner-service-token-cache-api
    build:
      context: https://github.com/ministryofjustice/fb-service-token-cache.git
    environment:
      SENTRY_DSN: sentry-dsn
      RAILS_ENV: development
      RAILS_LOG_TO_STDOUT: 'true'
      REDIS_URL: runner-service-token-cache-redis
      SERVICE_TOKEN_CACHE_TTL: 999999
      # Allow host authorization for Docker hostname in Rails development
      RAILS_DEVELOPMENT_HOSTS: runner-service-token-cache-api
    depends_on:
      - runner-service-token-cache-redis
    networks:
      - app-net
      - db-net

  runner-service-token-cache-redis:
    container_name: runner-service-token-cache-redis
    image: redis:5.0.6-alpine
    networks:
      - db-net
